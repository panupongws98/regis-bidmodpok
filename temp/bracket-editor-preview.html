<!DOCTYPE html><html lang="th"><head><meta charset="UTF-8" /><style>﻿:root {
  --bg: #f4efe4;
  --surface: rgba(255, 250, 241, 0.92);
  --surface-strong: #ffffff;
  --ink: #1b1b1b;
  --muted: #61584c;
  --line: rgba(61, 47, 31, 0.15);
  --brand: #b2431d;
  --brand-deep: #7f2d14;
  --warn: #965800;
  --danger: #9a1c1c;
  --shadow: 0 22px 60px rgba(69, 44, 15, 0.12);
  --radius-lg: 28px;
  --radius-sm: 12px;
}

* {
  box-sizing: border-box;
}

html,
body {
  margin: 0;
  min-height: 100%;
}

body {
  color: var(--ink);
  background:
    radial-gradient(circle at top left, rgba(255, 223, 160, 0.5), transparent 34%),
    radial-gradient(circle at right 10% top 20%, rgba(178, 67, 29, 0.16), transparent 30%),
    linear-gradient(180deg, #f8f3e7 0%, #efe4d2 100%);
  font-family: "Segoe UI Variable", "Trebuchet MS", Tahoma, sans-serif;
}

body::before {
  position: fixed;
  inset: 0;
  z-index: -1;
  background-image:
    linear-gradient(rgba(255, 255, 255, 0.28) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255, 255, 255, 0.28) 1px, transparent 1px);
  background-size: 32px 32px;
  content: "";
  opacity: 0.28;
  pointer-events: none;
}

button,
input,
select,
textarea {
  font: inherit;
}

.page-shell {
  width: min(1400px, calc(100vw - 32px));
  margin: 24px auto 40px;
}

.hero {
  display: grid;
  grid-template-columns: 1.4fr 0.8fr;
  gap: 18px;
  padding: 30px;
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
  background:
    linear-gradient(135deg, rgba(255, 249, 237, 0.94), rgba(255, 243, 221, 0.88)),
    #fff;
  box-shadow: var(--shadow);
}

.eyebrow,
.panel-kicker {
  margin: 0 0 8px;
  color: var(--brand-deep);
  font-size: 0.82rem;
  font-weight: 800;
  letter-spacing: 0.18em;
  text-transform: uppercase;
}

.hero h1,
.panel-header h2,
.class-manager-header h3 {
  margin: 0;
  font-family: "Bahnschrift", "Franklin Gothic Medium", "Arial Narrow", sans-serif;
  line-height: 1.02;
}

.hero h1 {
  font-size: clamp(2rem, 3vw, 3.3rem);
}

.hero-copy {
  max-width: 60ch;
  margin: 14px 0 0;
  color: var(--muted);
  font-size: 1rem;
  line-height: 1.65;
}

.hero-stats {
  display: grid;
  gap: 14px;
  align-content: center;
}

.stat-card {
  padding: 20px 22px;
  border: 1px solid rgba(178, 67, 29, 0.12);
  border-radius: 20px;
  background: rgba(255, 255, 255, 0.84);
}

.stat-card span {
  display: block;
  color: var(--muted);
  font-size: 0.92rem;
}

.stat-card strong {
  display: block;
  margin-top: 8px;
  color: var(--brand-deep);
  font-size: clamp(1.9rem, 2.6vw, 3rem);
}

.workspace {
  display: grid;
  grid-template-columns: minmax(360px, 0.9fr) minmax(420px, 1.1fr);
  gap: 22px;
  margin-top: 22px;
}

.panel {
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
  background: var(--surface);
  box-shadow: var(--shadow);
  backdrop-filter: blur(10px);
}

.panel-form,
.panel-list {
  padding: 24px;
}

.panel-header {
  display: flex;
  gap: 16px;
  align-items: flex-start;
  justify-content: space-between;
}

.badge {
  display: inline-flex;
  align-items: center;
  padding: 10px 14px;
  border-radius: 999px;
  background: rgba(178, 67, 29, 0.1);
  color: var(--brand-deep);
  font-size: 0.92rem;
  font-weight: 700;
  white-space: nowrap;
}

.badge-soft {
  background: rgba(61, 47, 31, 0.08);
}

.status-banner {
  margin-top: 18px;
  padding: 14px 16px;
  border: 1px solid rgba(29, 122, 70, 0.2);
  border-radius: var(--radius-sm);
  background: rgba(29, 122, 70, 0.08);
  color: #155a34;
  line-height: 1.5;
}

.status-banner[data-tone="warning"] {
  border-color: rgba(150, 88, 0, 0.2);
  background: rgba(150, 88, 0, 0.08);
  color: var(--warn);
}

.status-banner[data-tone="danger"] {
  border-color: rgba(154, 28, 28, 0.2);
  background: rgba(154, 28, 28, 0.08);
  color: var(--danger);
}

.registration-form {
  display: grid;
  gap: 18px;
  margin-top: 18px;
}

.field {
  display: grid;
  gap: 8px;
}

.field span,
.field-heading span {
  font-weight: 700;
}

.field-heading {
  display: flex;
  flex-wrap: wrap;
  gap: 8px 16px;
  align-items: baseline;
}

.field-heading small,
.toolbar-note,
.search-box span,
.bike-input label,
.class-manager-header p,
.class-meta,
.print-config-header p,
.print-column-summary,
.print-column-hint {
  color: var(--muted);
}

.field-grid {
  display: grid;
  grid-template-columns: 1fr 220px;
  gap: 16px;
}

input,
textarea,
select {
  width: 100%;
  padding: 13px 14px;
  border: 1px solid rgba(61, 47, 31, 0.18);
  border-radius: 14px;
  background: var(--surface-strong);
  color: var(--ink);
  outline: none;
  transition:
    border-color 180ms ease,
    transform 180ms ease,
    box-shadow 180ms ease;
}

input:focus,
textarea:focus,
select:focus {
  border-color: rgba(178, 67, 29, 0.72);
  box-shadow: 0 0 0 4px rgba(178, 67, 29, 0.14);
}

textarea {
  resize: vertical;
}

.bike-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 12px;
}

.bike-input {
  display: grid;
  gap: 8px;
}

.form-actions,
.card-actions,
.numbers-row {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

.form-actions {
  gap: 12px;
}

.button,
.action-link {
  display: inline-flex;
  justify-content: center;
  align-items: center;
  gap: 8px;
  padding: 12px 18px;
  border: 0;
  border-radius: 14px;
  cursor: pointer;
  transition:
    transform 180ms ease,
    opacity 180ms ease,
    box-shadow 180ms ease;
}

.button:hover,
.action-link:hover {
  transform: translateY(-1px);
}

.button:disabled,
.action-link:disabled {
  opacity: 0.45;
  cursor: not-allowed;
  transform: none;
}

.button-primary {
  background: linear-gradient(135deg, var(--brand), #c96924);
  color: #fff;
  box-shadow: 0 14px 30px rgba(178, 67, 29, 0.2);
}

.button-secondary,
.action-link {
  background: rgba(61, 47, 31, 0.08);
  color: var(--ink);
}

.button-danger {
  background: rgba(154, 28, 28, 0.1);
  color: var(--danger);
}

.button-small {
  min-width: 72px;
  padding: 10px 14px;
  border-radius: 12px;
}

.class-manager,
.print-config {
  margin-top: 20px;
  border-top: 1px solid var(--line);
  padding-top: 20px;
}

.class-manager summary,
.print-config summary {
  cursor: pointer;
  font-weight: 700;
}

.class-manager-body,
.print-config-body {
  margin-top: 16px;
}

.class-manager-header,
.print-config-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 14px;
}

.class-manager-header p,
.print-config-header p {
  margin: 8px 0 0;
  line-height: 1.5;
}

.class-form {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 10px;
  margin-top: 16px;
}

.class-list,
.print-column-list {
  display: grid;
  gap: 12px;
  margin-top: 16px;
}

.class-row,
.class-row-editing,
.print-column-row {
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto;
  gap: 14px;
  align-items: center;
  padding: 16px 18px;
  border: 1px solid rgba(61, 47, 31, 0.14);
  border-radius: 18px;
  background: rgba(255, 255, 255, 0.82);
}

.class-row-main {
  display: grid;
  gap: 6px;
}

.class-row-name {
  font-size: 1rem;
}

.class-row-actions,
.print-column-actions {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

.class-inline-input {
  max-width: 100%;
}

.class-empty-state,
.empty-state {
  padding: 24px;
  border: 1px dashed rgba(61, 47, 31, 0.18);
  border-radius: 18px;
  color: var(--muted);
  text-align: center;
}

.print-column-summary {
  margin-top: 14px;
  line-height: 1.6;
}

.print-column-row[data-disabled="true"] {
  opacity: 0.7;
}

.print-column-toggle {
  display: flex;
  align-items: center;
  gap: 12px;
  font-weight: 700;
}

.print-column-toggle input {
  width: 18px;
  height: 18px;
  margin: 0;
  accent-color: var(--brand);
}
.summary-panel {
  display: grid;
  gap: 18px;
  margin-top: 22px;
  padding: 22px;
  border: 1px solid rgba(61, 47, 31, 0.14);
  border-radius: 24px;
  background:
    linear-gradient(145deg, rgba(255, 251, 245, 0.96), rgba(250, 241, 226, 0.9));
}

.summary-panel-header {
  display: flex;
  gap: 16px;
  align-items: flex-start;
  justify-content: space-between;
}

.summary-panel-copy {
  max-width: 64ch;
  margin: 10px 0 0;
  color: var(--muted);
  line-height: 1.6;
}

.summary-controls {
  display: grid;
  gap: 14px;
}

.summary-select-field {
  max-width: 420px;
}

.summary-template-list {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 12px;
}

.summary-template-button {
  display: grid;
  gap: 6px;
  justify-items: start;
  padding: 16px 18px;
  border: 1px solid rgba(61, 47, 31, 0.14);
  border-radius: 18px;
  background: rgba(255, 255, 255, 0.88);
  color: var(--ink);
  text-align: left;
}

.summary-template-button strong {
  font-size: 0.98rem;
}

.summary-template-button span {
  color: var(--muted);
  line-height: 1.5;
}

.summary-template-button.is-active {
  border-color: rgba(178, 67, 29, 0.42);
  background: linear-gradient(135deg, rgba(178, 67, 29, 0.12), rgba(255, 255, 255, 0.94));
  box-shadow: 0 14px 30px rgba(178, 67, 29, 0.12);
}

.summary-preview-meta {
  color: var(--muted);
  line-height: 1.6;
}

.summary-preview-shell {
  padding: 16px;
  border: 1px dashed rgba(61, 47, 31, 0.18);
  border-radius: 22px;
  background: rgba(97, 88, 76, 0.06);
  overflow: auto;
}

.summary-preview-paper {
  display: grid;
  gap: 24px;
}

.summary-preview-paper .summary-sheet {
  width: min(100%, 860px);
  min-height: 1120px;
  margin: 0 auto;
  padding: 42px 34px;
  border: 1px solid rgba(61, 47, 31, 0.12);
  background: #fff;
  box-shadow: 0 28px 50px rgba(61, 47, 31, 0.1);
}

.summary-preview-paper-bracket {
  gap: 18px;
}

.summary-bracket-editor-actions {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  width: min(100%, 860px);
  margin: 0 auto;
  padding: 14px 16px;
  border: 1px solid rgba(61, 47, 31, 0.12);
  border-radius: 18px;
  background: rgba(255, 255, 255, 0.9);
}

.summary-bracket-editor-copy {
  color: var(--muted);
  line-height: 1.6;
}

.bracket-canvas {
  position: relative;
  width: 100%;
}

.bracket-canvas-svg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
}

.bracket-slot {
  position: absolute;
  display: flex;
  align-items: center;
}

.bracket-slot-select,
.bracket-slot-value {
  width: 100%;
  height: 100%;
  padding: 0 10px;
  border: 1.5px solid #111;
  border-radius: 14px;
  background: #fff;
  color: #111;
}

.bracket-slot-select {
  appearance: none;
  box-shadow: none;
}

.bracket-slot-value {
  display: flex;
  align-items: center;
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
}

.bracket-slot.champion .bracket-slot-value,
.bracket-slot.champion .bracket-slot-select {
  background: #f7efe2;
}

.summary-sheet {
  color: #111;
  font-family: Tahoma, "Segoe UI", sans-serif;
}

.summary-sheet-title {
  margin-bottom: 18px;
  font-size: 1.28rem;
  font-weight: 700;
}

.summary-sheet-note {
  margin-bottom: 12px;
  color: #4a4a4a;
  line-height: 1.5;
}

.summary-sheet-table {
  width: 100%;
  border-collapse: collapse;
  table-layout: fixed;
}

.summary-sheet-table th,
.summary-sheet-table td {
  height: 34px;
  padding: 6px 7px;
  border: 1px solid #111;
  font-size: 0.96rem;
  vertical-align: middle;
  text-align: center;
}

.summary-sheet-table td:first-child {
  text-align: left;
}

.summary-sheet-name-only .summary-sheet-table th,
.summary-sheet-name-only .summary-sheet-table td {
  text-align: left;
}

.summary-sheet-name-only .summary-sheet-table th {
  text-align: center;
}

.summary-bracket-wrap {
  width: 100%;
  overflow: auto;
}

.summary-bracket-svg {
  display: block;
  width: 100%;
  height: auto;
}

.bracket-title {
  font-size: 22px;
  font-weight: 700;
}
.bracket-page-note {
  fill: #4a4a4a;
  font-size: 12px;
  font-weight: 600;
}

.bracket-round-label,
.bracket-champion-label {
  font-size: 16px;
  font-weight: 700;
}

.bracket-connectors path {
  fill: none;
  stroke: #111;
  stroke-width: 3;
}

.bracket-box-group rect {
  fill: #fff;
  stroke: #111;
  stroke-width: 1.5;
}

.bracket-box-group.seeded rect {
  fill: #faf7f0;
}

.bracket-box-group.entrant rect {
  fill: #fffdf9;
}

.bracket-box-group.champion rect {
  fill: #f7efe2;
}

.bracket-box-group text {
  font-size: 12px;
  font-weight: 700;
}

.toolbar,
.search-box,
.registration-list {
  display: grid;
  gap: 14px;
}

.toolbar,
.registration-list {
  margin-top: 18px;
}

.registration-card {
  padding: 18px;
  border: 1px solid rgba(61, 47, 31, 0.14);
  border-radius: 22px;
  background:
    linear-gradient(145deg, rgba(255, 255, 255, 0.94), rgba(255, 250, 241, 0.88));
}

.registration-card-header {
  display: flex;
  justify-content: space-between;
  gap: 16px;
  align-items: flex-start;
}

.registration-card h3 {
  margin: 0;
  font-size: 1.1rem;
}

.meta-line {
  display: flex;
  flex-wrap: wrap;
  gap: 8px 12px;
  margin-top: 8px;
  color: var(--muted);
}

.numbers-row {
  margin-top: 14px;
}

.number-pill {
  display: inline-flex;
  align-items: center;
  padding: 7px 10px;
  border-radius: 999px;
  background: rgba(178, 67, 29, 0.1);
  color: var(--brand-deep);
  font-weight: 700;
}

.address-block {
  margin-top: 14px;
  color: var(--ink);
  line-height: 1.6;
  white-space: pre-line;
}

.action-link[data-tone="danger"] {
  background: rgba(154, 28, 28, 0.08);
  color: var(--danger);
}

.empty-state {
  line-height: 1.7;
}

@media (max-width: 1080px) {
  .hero,
  .workspace {
    grid-template-columns: 1fr;
  }
}

@media (max-width: 720px) {
  .page-shell {
    width: min(100vw - 18px, 100%);
    margin: 10px auto 24px;
  }

  .hero,
  .panel-form,
  .panel-list {
    padding: 18px;
  }

  .panel-header,
  .registration-card-header,
  .field-grid,
  .class-manager-header,
  .class-row,
  .class-row-editing,
  .print-config-header,
  .print-column-row,
  .summary-panel-header {
    grid-template-columns: 1fr;
    display: grid;
  }

  .panel-header {
    gap: 12px;
  }

  .bike-grid,
  .class-form {
    grid-template-columns: 1fr;
  }

  .class-row-actions,
  .print-column-actions {
    width: 100%;
  }

  .class-row-actions .button,
  .print-column-actions .button {
    flex: 1 1 0;
  }
  .summary-panel {
    padding: 18px;
  }

  .summary-preview-shell {
    padding: 10px;
  }

  .summary-preview-paper .summary-sheet {
    min-height: auto;
    padding: 18px 14px;
  }

  .summary-template-list {
    grid-template-columns: 1fr;
  }

  .summary-bracket-editor-actions {
    width: 100%;
    grid-template-columns: 1fr;
    display: grid;
  }

  .bracket-slot-select,
  .bracket-slot-value {
    padding: 0 6px;
  }
}
